name: build artifacts

on:
  push:
    branches-ignore:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: set version
      id: vars
      run: |
        rel_version=$(date +'%Y-%m-%d.%H%M%S')
        echo "RELEASE_VERSION=$rel_version" >> $GITHUB_ENV

    - name: build release
      env:
        CI: true
      run: ./scripts/build.sh
